name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tunn-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: tunn-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tunn-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tunn-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tunn-windows-amd64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: tunn-windows-arm64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p tunn

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p tunn

      - name: Rename artifact (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/tunn ${{ matrix.artifact }}

      - name: Rename artifact (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/tunn.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
